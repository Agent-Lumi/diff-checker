<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Checker | Compare Texts Side by Side</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Diff Checker</h1>
            <p class="subtitle">Compare two texts or files side by side</p>
        </header>
        
        <div class="toolbar">
            <div class="options">
                <label class="checkbox-label">
                    <input type="checkbox" id="ignoreWhitespace">
                    <span>Ignore whitespace</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="caseInsensitive">
                    <span>Case insensitive</span>
                </label>
            </div>
            <div class="actions">
                <button onclick="swapSides()" class="icon-btn" title="Swap sides (Ctrl+⇄)">⇄ Swap</button>
                <button onclick="clearAll()" class="icon-btn danger" title="Clear all (Ctrl+Del)">🗑 Clear</button>
            </div>
        </div>
        
        <div class="input-section">
            <div class="input-panel">
                <div class="panel-header">
                    <span class="panel-title">📄 Original</span>
                    <div class="panel-actions">
                        <label class="file-btn">
                            📁
                            <input type="file" id="leftFile" accept=".txt,.js,.html,.css,.json,.md,.py,.java,.cpp,.c">
                        </label>
                        <button onclick="copy('left')" class="icon-btn small" title="Copy">📋</button>
                    </div>
                </div>
                <textarea id="leftInput" placeholder="Paste your original text here..."></textarea>
            </div>
            
            <div class="input-panel">
                <div class="panel-header">
                    <span class="panel-title">📄 Modified</span>
                    <div class="panel-actions">
                        <label class="file-btn">
                            📁
                            <input type="file" id="rightFile" accept=".txt,.js,.html,.css,.json,.md,.py,.java,.cpp,.c">
                        </label>
                        <button onclick="copy('right')" class="icon-btn small" title="Copy">📋</button>
                    </div>
                </div>
                <textarea id="rightInput" placeholder="Paste your modified text here..."></textarea>
            </div>
        </div>
        
        <div id="inputStats" class="input-stats"></div>
        
        <button onclick="process()" class="compare-btn">
            <span>🔍 Compare</span>
            <kbd>Ctrl+Enter</kbd>
        </button>
        
        <div id="result" class="result-section"></div>
        
        <div id="diffOutput" class="diff-output"></div>
        
        <div class="export-section" id="exportSection" style="display: none;">
            <h3>📤 Export Results</h3>
            <div class="export-buttons">
                <button onclick="exportDiff('txt')" class="export-btn">📄 Text (.txt)</button>
                <button onclick="exportDiff('json')" class="export-btn">📋 JSON (.json)</button>
                <button onclick="exportDiff('html')" class="export-btn">🌐 HTML (.html)</button>
                <button onclick="copyDiff()" class="export-btn">📋 Copy to Clipboard</button>
            </div>
        </div>
        
        <footer>
            <p>Made with 💡 by <a href="https://github.com/Agent-Lumi" target="_blank">Lumi</a></p>
            <p class="shortcuts">
                <kbd>Ctrl+Enter</kbd> Compare · 
                <kbd>Ctrl+Del</kbd> Clear · 
                <kbd>Ctrl+S</kbd> Export
            </p>
        </footer>
    </div>
    
    <script src="app.js"></script>
    <script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
        
        // Show export section after first compare
        const observer = new MutationObserver(() => {
            const diffOutput = document.getElementById('diffOutput');
            const exportSection = document.getElementById('exportSection');
            if (diffOutput && diffOutput.innerHTML && exportSection) {
                exportSection.style.display = 'block';
            }
        });
        observer.observe(document.getElementById('diffOutput'), { childList: true });
    </script>
</body>
</html>
